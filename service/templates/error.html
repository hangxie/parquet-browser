{{define "error"}}
<style>
    .pb-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
    }
    .pb-modal-card {
        background: white;
        border-radius: 8px;
        padding: 25px 30px;
        max-width: 640px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
        position: relative;
    }
    .pb-modal-card h2 {
        color: #d32f2f;
        margin: 0 30px 12px 0;
        border-bottom: none;
        padding-bottom: 0;
    }
    .pb-modal-close {
        position: absolute;
        top: 10px;
        right: 14px;
        background: none;
        color: #888;
        border: none;
        box-shadow: none;
        font-size: 1.8em;
        line-height: 1;
        padding: 0 6px;
        cursor: pointer;
    }
    .pb-modal-close:hover {
        color: #333;
        transform: none;
        box-shadow: none;
        background: none;
    }
    .pb-modal-detail {
        white-space: pre-wrap;
        margin-top: 8px;
        background: #f5f5f5;
        padding: 10px;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
        font-size: 0.85em;
    }
    .pb-modal-actions {
        margin-top: 20px;
        text-align: right;
    }
</style>
<div class="pb-modal-overlay pb-error-modal"
     role="dialog"
     aria-modal="true"
     aria-label="{{.Title}}"
     onclick="if (event.target === this) this.remove()">
    <div class="pb-modal-card">
        <button type="button" class="pb-modal-close" aria-label="Close"
                onclick="this.closest('.pb-modal-overlay').remove()">&times;</button>
        <h2>{{.Title}}</h2>
        <div class="error">{{.Message}}</div>
        {{if .Detail}}
        <details style="margin-top: 15px;">
            <summary>Details</summary>
            <pre class="pb-modal-detail">{{.Detail}}</pre>
        </details>
        {{end}}
        <div class="pb-modal-actions">
            <button type="button" class="btn"
                    onclick="this.closest('.pb-modal-overlay').remove()">Close</button>
        </div>
    </div>
</div>
{{end}}
